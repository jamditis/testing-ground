<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Instagram Square</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,500;0,6..72,700;1,6..72,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1080px;height:1080px;overflow:hidden;
  font-family:'Outfit',sans-serif;
  background:#f5f0e8;
  color:#1a1a1f;
  position:relative;
}

/* Top amber stripe */
.top-stripe{
  position:absolute;top:0;left:0;right:0;
  height:8px;
  background:linear-gradient(90deg,#c4841d,#e8a840,#c4841d);
}

/* Grain */
body::after{
  content:'';position:absolute;inset:0;
  opacity:0.03;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.content{
  position:relative;z-index:1;
  height:100%;
  display:flex;
  flex-direction:column;
  padding:70px 80px 60px;
}

/* Header */
.org-label{
  font-size:13px;
  font-weight:600;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:#c4841d;
  margin-bottom:20px;
}
h1{
  font-family:'Newsreader',Georgia,serif;
  font-weight:700;
  font-size:58px;
  line-height:1.05;
  letter-spacing:-1.5px;
  margin-bottom:8px;
}
h1 em{
  font-style:italic;
  font-weight:300;
  color:#c4841d;
  display:block;
  font-size:52px;
}

.rule{
  width:80px;height:3px;
  background:#c4841d;
  margin:28px 0 32px;
}

.subtitle{
  font-family:'Newsreader',Georgia,serif;
  font-style:italic;
  font-size:22px;
  color:#5a5a6e;
  line-height:1.45;
  max-width:700px;
}

/* Stats grid */
.stats{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:rgba(26,26,31,0.12);
  border:1px solid rgba(26,26,31,0.12);
  margin-top:auto;
  align-self:stretch;
}
.stat-card{
  background:#f5f0e8;
  padding:40px 36px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.stat-num{
  font-family:'Newsreader',Georgia,serif;
  font-weight:700;
  font-size:64px;
  line-height:1;
  color:#1a1a1f;
}
.stat-label{
  font-size:13px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#5a5a6e;
  margin-top:8px;
}
.stat-card.highlight .stat-num{color:#c4841d}

/* Bottom bar */
.bottom{
  margin-top:1px;
  background:#1a1a1f;
  padding:20px 36px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.bottom-url{
  font-size:14px;
  font-weight:500;
  color:rgba(245,240,232,0.6);
  letter-spacing:0.5px;
}
.bottom-date{
  font-size:12px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#c4841d;
}
</style>
</head>
<body>
  <div class="top-stripe"></div>
  <div class="content">
    <div class="org-label">Center for Cooperative Media</div>
    <h1>NJ News Commons<em>by the numbers</em></h1>
    <div class="rule"></div>
    <p class="subtitle">9 years of events, trainings, and resources for New Jersey's journalism community</p>

    <div style="margin-top:auto">
      <div class="stats">
        <div class="stat-card highlight">
          <div class="stat-num">293</div>
          <div class="stat-label">Events hosted</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">35</div>
          <div class="stat-label">NJ newsletters</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">145</div>
          <div class="stat-label">Livestreamed</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">84</div>
          <div class="stat-label">Sessions recorded</div>
        </div>
      </div>
      <div class="bottom">
        <span class="bottom-url">jamditis.github.io/testing-ground</span>
        <span class="bottom-date">Data: 2018 &ndash; 2026</span>
      </div>
    </div>
  </div>
</body>
</html>
