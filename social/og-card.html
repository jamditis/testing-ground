<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Card</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,500;0,6..72,700;1,6..72,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1200px;height:630px;overflow:hidden;
  font-family:'Outfit',sans-serif;
  background:#1a1a1f;
  color:#f5f0e8;
  position:relative;
}

/* Diagonal amber accent */
.accent-bar{
  position:absolute;
  top:0;left:0;right:0;
  height:6px;
  background:linear-gradient(90deg,#c4841d 0%,#e8a840 50%,#c4841d 100%);
}

/* Noise texture */
body::after{
  content:'';position:absolute;inset:0;
  opacity:0.04;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.layout{
  display:grid;
  grid-template-columns:1fr 400px;
  height:100%;
  position:relative;
  z-index:1;
}

/* Left: main content */
.left{
  padding:60px 60px 50px 70px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.org-label{
  font-size:12px;
  font-weight:600;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#c4841d;
  margin-bottom:16px;
}
h1{
  font-family:'Newsreader',Georgia,serif;
  font-weight:700;
  font-size:52px;
  line-height:1.08;
  letter-spacing:-1px;
  margin-bottom:12px;
}
h1 em{
  font-style:italic;
  font-weight:300;
  color:#e8a840;
}
.subtitle{
  font-family:'Newsreader',Georgia,serif;
  font-style:italic;
  font-size:19px;
  color:rgba(245,240,232,0.6);
  max-width:480px;
  line-height:1.45;
}
.bottom-bar{
  display:flex;
  align-items:center;
  gap:24px;
}
.url-tag{
  font-size:13px;
  font-weight:500;
  letter-spacing:1px;
  color:rgba(245,240,232,0.5);
}
.divider-dot{
  width:4px;height:4px;
  border-radius:50%;
  background:rgba(245,240,232,0.25);
}
.date-range{
  font-size:13px;
  font-weight:500;
  letter-spacing:1px;
  color:rgba(245,240,232,0.5);
  text-transform:uppercase;
}

/* Right: stats column */
.right{
  background:rgba(245,240,232,0.04);
  border-left:1px solid rgba(245,240,232,0.08);
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:50px 50px;
  gap:0;
}
.stat{
  padding:22px 0;
  border-bottom:1px solid rgba(245,240,232,0.08);
}
.stat:last-child{border-bottom:none}
.stat-num{
  font-family:'Newsreader',Georgia,serif;
  font-weight:700;
  font-size:48px;
  line-height:1;
  color:#e8a840;
}
.stat-label{
  font-size:12px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(245,240,232,0.5);
  margin-top:4px;
}

/* Decorative corner marks */
.corner{
  position:absolute;
  width:30px;height:30px;
  z-index:2;
}
.corner::before,.corner::after{
  content:'';position:absolute;
  background:rgba(196,132,29,0.3);
}
.corner-tl{top:20px;left:20px}
.corner-tl::before{top:0;left:0;width:30px;height:1px}
.corner-tl::after{top:0;left:0;width:1px;height:30px}
.corner-br{bottom:20px;right:20px}
.corner-br::before{bottom:0;right:0;width:30px;height:1px}
.corner-br::after{bottom:0;right:0;width:1px;height:30px}
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <div class="layout">
    <div class="left">
      <div>
        <div class="org-label">Center for Cooperative Media</div>
        <h1>NJ News Commons<br><em>Events &amp; Newsletter Dashboard</em></h1>
        <p class="subtitle">An interactive archive of events, trainings, and newsletters serving New Jersey's journalism community</p>
      </div>
      <div class="bottom-bar">
        <span class="url-tag">jamditis.github.io/testing-ground</span>
        <span class="divider-dot"></span>
        <span class="date-range">2018 &ndash; 2026</span>
      </div>
    </div>
    <div class="right">
      <div class="stat">
        <div class="stat-num">293</div>
        <div class="stat-label">Events archived</div>
      </div>
      <div class="stat">
        <div class="stat-num">35</div>
        <div class="stat-label">NJ newsletters</div>
      </div>
      <div class="stat">
        <div class="stat-num">145</div>
        <div class="stat-label">Livestreamed</div>
      </div>
      <div class="stat">
        <div class="stat-num">84</div>
        <div class="stat-label">Recorded</div>
      </div>
    </div>
  </div>
</body>
</html>
